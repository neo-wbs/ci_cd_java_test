name: Release

on:
  push:
    tags:
      - "v*"          # startet nur bei Tags wie v1.0.0, v2.1.3 ...

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: JAR bauen
        run: mvn package -DskipTests --no-transfer-progress

      # GitHub Release erstellen und JAR anhängen
      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          # Tag-Name wird automatisch aus dem Push-Event gelesen (v1.0.0)
          name: "Release ${{ github.ref_name }}"
          # Das JAR wird direkt an den Release angehängt
          files: target/ci_cd_java_test-*.jar
          # Automatisch aus Commit-Messages generierte Changelog-Liste
          generate_release_notes: true
